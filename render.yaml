services:
  # Backend API Server
  - type: web
    name: leonuxAI-2
    env: node
    buildCommand: cd server && npm install
    startCommand: node server/index.js
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: MONGODB_URI
        value: mongodb+srv://keerthivasan:keerthivasan123456789@cluster0.cjc3t9h.mongodb.net/leonux-ai?retryWrites=true&w=majority
      - key: OPENROUTER_API_KEY
        value: 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
      - key: PORT
        value: 10000

  # Frontend Static Site
  - type: web
    name: leonuxAI-3
    env: static
    buildCommand: node verify-env.js && npm ci && npm run build && ls -la dist
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VITE_API_URL
        value: https://leonuxai-2.onrender.com/api
