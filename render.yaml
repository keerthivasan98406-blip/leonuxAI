services:
  # Backend API Server
  - type: web
    name: leonux-ai-backend
    env: node
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: MONGODB_URI
        value: mongodb+srv://keerthivasan:keerthivasan123456789@cluster0.cjc3t9h.mongodb.net/leonux-ai?retryWrites=true&w=majority
      - key: OPENROUTER_API_KEY
        value: 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
      - key: PORT
        value: 10000

  # Frontend Static Site
  - type: web
    name: leonux-ai-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VITE_API_URL
        value: https://leonux-ai-backend.onrender.com/api
