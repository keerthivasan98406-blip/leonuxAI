<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenRouter API Key Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #1a1a1a; color: white; }
        .container { max-width: 600px; margin: 0 auto; }
        button { background: #10b981; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #059669; }
        .result { margin-top: 20px; padding: 15px; border-radius: 5px; }
        .success { background: #065f46; border: 1px solid #10b981; }
        .error { background: #7f1d1d; border: 1px solid #ef4444; }
        .loading { background: #374151; border: 1px solid #6b7280; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔑 OpenRouter API Key Test</h1>
        <p>This will test if your API key is working correctly.</p>
        
        <button onclick="testApiKey()">Test API Key</button>
        
        <div id="result"></div>
    </div>

    <script>
        const API_KEY = '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';
        
        async function testApiKey() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<div class="result loading">🔄 Testing API key...</div>';
            
            try {
                const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${API_KEY}`,
                        'HTTP-Referer': 'https://leonux-ai.onrender.com',
                        'X-Title': 'Leonux AI Test'
                    },
                    body: JSON.stringify({
                        model: 'deepseek/deepseek-chat',
                        messages: [
                            { role: 'user', content: 'Say "API key is working!" if you can read this.' }
                        ],
                        max_tokens: 50,
                        temperature: 0.7
                    })
                });

                if (response.ok) {
                    const data = await response.json();
                    const message = data.choices[0].message.content;
                    resultDiv.innerHTML = `
                        <div class="result success">
                            <h3>✅ API Key is Working!</h3>
                            <p><strong>Response:</strong> ${message}</p>
                            <p><strong>Status:</strong> ${response.status} ${response.statusText}</p>
                            <p><strong>Model:</strong> deepseek/deepseek-chat</p>
                        </div>
                    `;
                } else {
                    const errorData = await response.text();
                    resultDiv.innerHTML = `
                        <div class="result error">
                            <h3>❌ API Key Failed</h3>
                            <p><strong>Status:</strong> ${response.status} ${response.statusText}</p>
                            <p><strong>Error:</strong> ${errorData}</p>
                            <p><strong>Possible Issues:</strong></p>
                            <ul>
                                <li>API key is invalid</li>
                                <li>No credits remaining</li>
                                <li>Key has been revoked</li>
                            </ul>
                        </div>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="result error">
                        <h3>❌ Network Error</h3>
                        <p><strong>Error:</strong> ${error.message}</p>
                        <p>Check your internet connection and try again.</p>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
